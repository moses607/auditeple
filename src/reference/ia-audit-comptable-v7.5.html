<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Libre Franklin',system-ui,sans-serif;background:#F5F5FE;color:#161616;font-size:14px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
input:focus,select:focus,textarea:focus{outline:2px solid #000091;outline-offset:2px}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
button{font-family:inherit;cursor:pointer}
.fade{animation:fadeUp .35s ease}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-weight:700;color:#666;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e5e5e5;white-space:nowrap}
td{padding:8px 10px;font-size:13px;border-bottom:1px solid #f6f6f6}
.mono{font-family:'Courier New',monospace}.bold{font-weight:700}.right{text-align:right}
.inp{width:100%;padding:8px 12px;border:1.5px solid #e5e5e5;border-radius:6px;font-size:13px;font-weight:600;background:#fff}
.btn{padding:8px 16px;border:none;border-radius:6px;font-weight:700;font-size:12px;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-p{background:#000091;color:#fff}.btn-ok{background:#18753C;color:#fff}.btn-err{background:#CE0500;color:#fff}.btn-w{background:#B34000;color:#fff}.btn-g{background:#e5e5e5;color:#3A3A3A}
.btn:hover{opacity:.9}
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid #e5e5e5;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;color:#fff;white-space:nowrap;display:inline-block}
.ref{background:#E8EDFF;padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:12px;color:#0063CB;font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.interco-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}.interco-badge:hover{transform:scale(1.05);filter:brightness(1.1)}.billetage-grid{display:grid;grid-template-columns:70px 60px 80px;gap:4px 8px;align-items:center;font-size:12px}.billetage-grid .lbl{font-weight:700;color:#3A3A3A}.nav-section{font-size:9px;font-weight:800;color:#666;text-transform:uppercase;letter-spacing:1.5px;padding:12px 16px 4px;margin-top:4px}</style>
</head>

<div id="root"></div>

const fmt=v=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(v||0);
const fmtD=d=>d?new Intl.DateTimeFormat('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}).format(new Date(d)):'\u2014';
const fmtDT=d=>d?new Intl.DateTimeFormat('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(d)):'\u2014';
const pct=v=>(v||0).toFixed(1)+' %';
const sColor=s=>s>=80?C.ok:s>=60?C.w:s>=40?C.w:C.err;
const uid=()=>'_'+Math.random().toString(36).slice(2,9);
const exportCSV=(data,fn,cols)=>{const h=cols.map(c=>c.l).join(';');const r=data.map(d=>cols.map(c=>c.a(d)).join(';'));const b=new Blob(['\uFEFF'+[h,...r].join('\n')],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn+'.csv';a.click();};

const Badge=({t,c})=><span className="badge" style={{background:c}}>{t}</span>;
const Ref=({t})=><div className="ref"><strong>Réf. : </strong>{t}</div>;
const Denied=()=><div style={{background:C.errL,padding:48,borderRadius:12,textAlign:'center',color:C.err,fontWeight:700}}>{IC.lock}<div style={{marginTop:12}}>Accès refusé</div></div>;
const Kpi=({label,value,sub,icon,color,trend})=>(
  <div className="card" style={{display:'flex',alignItems:'flex-start',gap:12,padding:'14px 16px'}}>
    <div style={{width:34,height:34,borderRadius:8,background:(color||C.p)+'14',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:color||C.p}}>{icon}</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:11,fontWeight:600,color:C.g5,textTransform:'uppercase',letterSpacing:.5}}>{label}</div>
      <div style={{fontSize:18,fontWeight:900,color:C.g9,lineHeight:1.2}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:C.g5,marginTop:1,display:'flex',alignItems:'center',gap:4}}>{trend==='up'&&<span style={{color:C.ok}}>{IC.up}</span>}{trend==='dn'&&<span style={{color:C.err}}>{IC.dn}</span>}{sub}</div>}
    </div>
  </div>
);
const Gauge=({score,label})=>{const c=sColor(score);const ci=2*Math.PI*42;const off=ci-(score/100)*ci;
  return(<div style={{textAlign:'center'}}><svg width={96} height={96} viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke={C.g2} strokeWidth="8"/><circle cx="50" cy="50" r="42" fill="none" stroke={c} strokeWidth="8" strokeDasharray={ci} strokeDashoffset={off} strokeLinecap="round" transform="rotate(-90 50 50)" style={{transition:'stroke-dashoffset .8s ease'}}/><text x="50" y="46" textAnchor="middle" fontSize="20" fontWeight="900" fill={c}>{score}</text><text x="50" y="60" textAnchor="middle" fontSize="8" fontWeight="700" fill={C.g5}>/100</text></svg>{label&&<div style={{fontSize:10,fontWeight:700,color:c,marginTop:2,textTransform:'uppercase'}}>{label}</div>}</div>);
};
const Hdr=({icon,title,color,onExport,children})=>(
  <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:8,marginBottom:16}}>
    <h2 style={{fontSize:18,fontWeight:900,color:C.g9,display:'flex',alignItems:'center',gap:8,margin:0}}><span style={{color}}>{icon}</span>{title}</h2>
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{children}{onExport&&<button className="btn btn-p" onClick={onExport}>{IC.dl} CSV</button>}</div>
  </div>
);
const Modal=({open,onClose,title,children,wide})=>{if(!open)return null;return(
  <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal" style={wide?{maxWidth:900}:{}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><h3 style={{fontSize:18,fontWeight:800}}>{title}</h3><button onClick={onClose} style={{background:'none',border:'none',color:C.g5}}>{IC.x}</button></div>
    {children}
  </div></div>
);};
const Field=({label,value,onChange,type,ph,opts,rows,req})=>(
  <div style={{marginBottom:10}}>
    <label style={{display:'block',fontSize:12,fontWeight:700,color:C.g5,marginBottom:3}}>{label}{req&&<span style={{color:C.err}}> *</span>}</label>
    {opts?<select value={value} onChange={e=>onChange(e.target.value)} className="inp">{opts.map(o=><option key={o.v!==undefined?o.v:o} value={o.v!==undefined?o.v:o}>{o.l||o}</option>)}</select>
    :rows?<textarea value={value} onChange={e=>onChange(e.target.value)} className="inp" rows={rows} placeholder={ph}/>
    :<input type={type||'text'} value={value} onChange={e=>onChange(e.target.value)} className="inp" placeholder={ph} step={type==='number'?'0.01':undefined}/>}
  </div>
);
const genPDF=(title,content)=>{
  const w=window.open('','_blank','width=800,height=600');if(!w){alert('Autorisez les popups');return;}
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title><style>@page{size:A4;margin:20mm}body{font-family:Libre Franklin,Arial,sans-serif;font-size:12px;color:#161616;line-height:1.6}h1{color:#000091;font-size:22px;border-bottom:3px solid #000091;padding-bottom:8px;margin-bottom:16px}h2{color:#000091;font-size:16px;margin:16px 0 8px;border-left:4px solid #000091;padding-left:10px}table{width:100%;border-collapse:collapse;margin:10px 0;font-size:11px}th{background:#000091;color:#fff;padding:6px 8px;text-align:left;font-size:10px}td{padding:5px 8px;border-bottom:1px solid #e5e5e5}tr:nth-child(even){background:#f8f8ff}.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #e5e5e5}.logo{font-size:22px;font-weight:900;color:#000091}.meta{text-align:right;font-size:11px;color:#666}.footer{margin-top:24px;padding-top:10px;border-top:2px solid #000091;font-size:10px;color:#666;text-align:center}.rh{background:#CE0500;color:#fff;padding:2px 6px;border-radius:3px;font-weight:700;font-size:10px}.rm{background:#B34000;color:#fff;padding:2px 6px;border-radius:3px;font-weight:700;font-size:10px}.rl{background:#18753C;color:#fff;padding:2px 6px;border-radius:3px;font-weight:700;font-size:10px}.sign{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:32px}.sign>div{border-top:1px solid #161616;padding-top:6px;text-align:center;font-size:11px}@media print{button,.no-print{display:none!important}}.interco-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}.interco-badge:hover{transform:scale(1.05);filter:brightness(1.1)}.billetage-grid{display:grid;grid-template-columns:70px 60px 80px;gap:4px 8px;align-items:center;font-size:12px}.billetage-grid .lbl{font-weight:700;color:#3A3A3A}.nav-section{font-size:9px;font-weight:800;color:#666;text-transform:uppercase;letter-spacing:1.5px;padding:12px 16px 4px;margin-top:4px}</style></head><body><div class="header"><div class="logo">IA Audit Comptable v7.2</div><div class="meta">EPLE \u2014 Outil AC<br/>'+new Date().toLocaleDateString('fr-FR')+'</div></div><h1>'+title+'</h1>'+content+'<div class="footer">IA Audit Comptable v7.2 \u2014 Document g\u00e9n\u00e9r\u00e9 automatiquement</div><script>setTimeout(()=>window.print(),500)<\/script></body></html>');
  w.document.close();
};

const REF_CMP={SANS_PUB:25000,MAPA:40000,FORMALISE:90000,UE:143000};

const _ls=(()=>{try{const t='__t';localStorage.setItem(t,t);localStorage.removeItem(t);return true;}catch(e){return false;}})();
const LS={get:(k,d)=>{if(!_ls)return d;try{const v=localStorage.getItem('ia_audit_'+k);return v?JSON.parse(v):d;}catch(e){return d;}},set:(k,v)=>{if(!_ls)return;try{localStorage.setItem('ia_audit_'+k,JSON.stringify(v));}catch(e){}}};
const usePersist=(key,init)=>{const[val,setVal]=useState(()=>LS.get(key,init));const set=useCallback(v=>{setVal(prev=>{const nv=typeof v==='function'?v(prev):v;LS.set(key,nv);return nv;});},[key]);return[val,set];};

        <div style={{fontSize:10,color:C.p,fontStyle:'italic',marginBottom:8}}>Réf.: Décret 2012-1246, art. 18 §1 (tenue de la comptabilité générale), §10 (maniement des fonds), §11 (conservation des pièces justificatives) — Art. 22-1 (régisseurs: tenue de la comptabilité des opérations) — Instruction M9.6</div>
        <div style={{display:'flex',gap:8}}>
          <button className={'btn '+(f.journalCaisse===true?'btn-ok':'btn-g')} onClick={()=>sF({...f,journalCaisse:true})} style={{fontSize:11,padding:'4px 12px'}}>{IC.check} Présent et à jour</button>

      </div>
      <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn btn-ok" onClick={valider}>{IC.check} Valider</button><button className="btn btn-err" onClick={()=>sF(null)}>{IC.x} Annuler</button></div>

};

const ModVoy=()=>{const[f,sF]=useState(null);const[ed,sEd]=useState(null);const[calc,sCalc]=useState(false);if(!ok('VOYAGES'))return<Denied/>;const v=voy.filter(x=>!etab||x.uai===etab.uai);const vol=v.reduce((s,x)=>s+(x.dep_reel||x.dep_eng),0);

    const obj={id:isEdit?data.id:uid(),titre:data.titre,classe:data.classe,nb,tarif,rec,dep_eng,dep_reel,s471,delai:parseInt(data.delai)||0,statut:s471<0?'ALERTE Solde débiteur':s471>0?'Excédent à reverser':'Soldé',prof:data.prof,delib:data.delib,uai:etab?.uai||'9710001A'};

    toast(isEdit?'Modifié':'Créé','success');sF(null);sEd(null);};
  const delVoy=(id,titre)=>{if(!confirm('Supprimer '+titre+' ?'))return;setVoy(p=>p.filter(x=>x.id!==id));log('VOYAGE_DEL',titre);toast('Supprimé','success');};

    </div>

    {vol>REF_CMP.SANS_PUB&&<div style={{background:C.errL,padding:'8px 14px',borderRadius:6,marginBottom:12,fontSize:12,fontWeight:700,color:C.err}}>{IC.alert} Volume {fmt(vol)} — {vol>REF_CMP.FORMALISE?'Procédure formalisée obligatoire (>'+fmt(REF_CMP.FORMALISE)+')':vol>REF_CMP.MAPA?'MAPA obligatoire (>'+fmt(REF_CMP.MAPA)+')':'Seuil de publicité dépassé (>'+fmt(REF_CMP.SANS_PUB)+')'}</div>}
    {calc&&<div style={{background:'#f0f4ff',borderRadius:10,padding:20,marginBottom:16,border:'2px solid '+C.info}}>
      <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>{IC.scale} Calculateur Budget Voyage & Marchés Publics</div>

        <div style={{padding:12,background:'#fff',borderRadius:8,border:'1px solid '+C.g2}}>

          <div>Total dépenses réelles: <strong className="mono">{fmt(totDep)}</strong></div>

// ═══ ANALYSE FINANCIÈRE ═══
const ModAnalyse=()=>{if(!ok('GESTION'))return<Denied/>;const liste=etab?[etab]:etabs;
  const alertes=[];
  liste.forEach(e=>{
    const fr=e.fr[0]?.v||0;const frJ=Math.round(fr/(e.budget/365));const bfr=e.bfr[0]?.v||0;const treso=e.treso[0]?.v||0;
    if(frJ<30)alertes.push({type:'CRITIQUE',msg:`${e.nom}: FR ${frJ}j < 30j minimum`,icon:IC.alert,color:C.err});
    else if(frJ<60)alertes.push({type:'ATTENTION',msg:`${e.nom}: FR ${frJ}j < 60j recommandé CRC`,icon:IC.alert,color:C.w});
    if(bfr<0)alertes.push({type:'CRITIQUE',msg:`${e.nom}: BFR négatif ${fmt(bfr)}`,icon:IC.alert,color:C.err});
    if(treso<0)alertes.push({type:'CRITIQUE',msg:`${e.nom}: Trésorerie négative ${fmt(treso)}`,icon:IC.alert,color:C.err});
    if(e.budget>0&&fr/e.budget>0.5)alertes.push({type:'INFO',msg:`${e.nom}: FR > 50% du budget — Sous-consommation?`,icon:IC.info||IC.check,color:C.info});
  });

const ModPlan=()=>{const[f,sF]=useState(null);if(!ok('GESTION'))return<Denied/>;const pT=plan.reduce((s,p)=>s+p.planning.length,0);const pR=plan.reduce((s,p)=>s+p.realises.length,0);
  const today=new Date().toISOString().split('T')[0];
  const toggleReal=(pId,date)=>{setPlan(prev=>prev.map(p=>{if(p.id!==pId)return p;const has=p.realises.includes(date);return{...p,realises:has?p.realises.filter(d=>d!==date):[...p.realises,date]};}));log('PLAN_TOGGLE',pId);toast('Mis à jour','success');};
  const addCtrl=()=>{if(!f||!f.type||!f.freq){toast('Requis','warning');return;}
    setPlan(p=>[...p,{id:uid(),type:f.type,freq:f.freq,risque:f.risque||'MOYEN',ref:f.ref||'',planning:f.dates?f.dates.split(',').map(d=>d.trim()):[],realises:[],obj:f.obj||''}]);
    log('PLAN_ADD',f.type);toast('Contrôle ajouté','success');sF(null);};
  const delCtrl=(id,type)=>{if(!confirm('Supprimer contrôle '+type+' ?'))return;setPlan(p=>p.filter(x=>x.id!==id));log('PLAN_DEL',type);toast('Supprimé','success');};
  return(<div className="fade"><div className="card">
    <Hdr icon={IC.cal} title="Plan de Contrôle — CICF 2025" color={C.p} onExport={()=>{exportCSV(plan,'plan_controle',[{l:'Type',a:r=>r.type},{l:'Fréquence',a:r=>r.freq},{l:'Risque',a:r=>r.risque},{l:'Planifiés',a:r=>r.planning.length},{l:'Réalisés',a:r=>r.realises.length}]);toast('OK','success');}}>
      <button className="btn btn-ok" onClick={()=>sF({type:'',freq:'Trimestriel',risque:'MOYEN',ref:'',dates:'',obj:''})}>{IC.plus} Nouveau contrôle</button>
    </Hdr>
    <Ref t="Exigence CRC: plan annuel hiérarchisé par risques"/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:8,marginBottom:12}}>
      <Kpi label="Contrôles planifiés" value={pT} icon={IC.cal} color={C.p}/>
      <Kpi label="Réalisés" value={pR} icon={IC.check} color={C.ok}/>
      <Kpi label="Taux réalisation" value={pT?Math.round(pR/pT*100)+'%':'—'} icon={IC.trend} color={pT&&pR/pT>=0.7?C.ok:C.err}/>
    </div>
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}><IntercoLink to="carto" label="Cartographie" icon={IC.map} color={C.err}/><IntercoLink to="pv" label="PV audit" icon={IC.clip} color={C.p}/><IntercoLink to="caisse" label="Caisse" icon={IC.bank} color={C.ok}/><IntercoLink to="stocks" label="Stocks" icon={IC.pkg} color={C.w}/><IntercoLink to="rappr" label="Rapprochement" icon={IC.scale} color={C.info}/></div>
    {f&&<div style={{background:C.pL||'#f0e6ff',borderRadius:10,padding:20,marginBottom:16,border:'2px solid '+C.p}}>
      <div style={{fontWeight:700,marginBottom:8}}>Ajouter un contrôle au plan</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10}}>
        <Field label="Type de contrôle" value={f.type} onChange={v=>sF({...f,type:v})} req ph="Régies, Stocks, Paie..."/>
        <div><label style={{fontSize:11,fontWeight:700,display:'block',marginBottom:2}}>Fréquence *</label><select value={f.freq} onChange={e=>sF({...f,freq:e.target.value})} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid #ddd',fontSize:13}}><option>Mensuel</option><option>Trimestriel</option><option>Semestriel</option><option>Annuel</option></select></div>
        <div><label style={{fontSize:11,fontWeight:700,display:'block',marginBottom:2}}>Risque</label><select value={f.risque} onChange={e=>sF({...f,risque:e.target.value})} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid #ddd',fontSize:13}}><option value="ÉLEVÉ">ÉLEVÉ</option><option value="MOYEN">MOYEN</option><option value="FAIBLE">FAIBLE</option></select></div>
        <Field label="Référence" value={f.ref} onChange={v=>sF({...f,ref:v})} ph="M9-6 §..."/>
        <Field label="Dates planifiées" value={f.dates} onChange={v=>sF({...f,dates:v})} ph="2025-03-31, 2025-06-30"/>
        <Field label="Objectif" value={f.obj} onChange={v=>sF({...f,obj:v})} ph="Vérifier..."/>
      </div>
      <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn btn-ok" onClick={addCtrl}>{IC.check} Ajouter</button><button className="btn btn-err" onClick={()=>sF(null)}>{IC.x}</button></div>
    </div>}
    <div style={{display:'flex',flexDirection:'column',gap:10}}>{plan.map(p=>{const retard=p.planning.filter(d=>d<today&&!p.realises.includes(d)).length;
      return(<div key={p.id} style={{padding:'14px 16px',borderRadius:10,border:'1px solid '+(retard>0?C.err:C.g2),background:retard>0?C.errL:'#fff'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div><Badge t={p.risque} c={p.risque==='ÉLEVÉ'?C.err:p.risque==='MOYEN'?C.w:C.ok}/> <strong>{p.type}</strong> <span style={{fontSize:11,color:C.g5}}>— {p.freq} — {p.ref}</span></div>
          <div><span style={{fontSize:11,color:C.g5,marginRight:8}}>{p.realises.length}/{p.planning.length}</span><button className="btn btn-err" style={{padding:'2px 6px',fontSize:11}} onClick={()=>delCtrl(p.id,p.type)}>{IC.x}</button></div>
        </div>

        })}</div>
      </div>);
    })}</div>
  </div></div>);
};

const ModCarto=()=>{const[f,sF]=useState(null);const d=carto.filter(x=>!etab||x.uai===etab.uai);
  const riskC=r=>{const n=r.prob*r.impact*r.maitrise;return n>=40?{c:C.err,l:'CRITIQUE'}:n>=20?{c:C.w,l:'MAJEUR'}:n>=10?{c:C.info,l:'MOYEN'}:{c:C.ok,l:'FAIBLE'};};
  const pdfCarto=()=>{let h='<h2>Cartographie des risques comptables et financiers</h2><p>Établissement: <strong>'+(etab?.nom||'Agence comptable — Groupement')+'</strong> — Date: '+new Date().toLocaleDateString('fr-FR')+'</p><p><strong>Destinataire:</strong> Rectorat / Conseil d&#39;Administration</p>';
    h+='<p><em>Méthodologie: Probabilité (1-5) × Impact (1-5) × Maîtrise (1-5). Note = P×I×M. Criticité: ≥40 Critique, ≥20 Majeur, ≥10 Moyen, <10 Faible.</em></p>';
    h+='<table><tr><th>Processus</th><th>Risque identifié</th><th>P</th><th>I</th><th>M</th><th>Note</th><th>Criticité</th><th>Action corrective</th><th>Responsable</th><th>Échéance</th><th>Statut</th></tr>';
    d.sort((a,b)=>(b.prob*b.impact*b.maitrise)-(a.prob*a.impact*a.maitrise)).forEach(r=>{const rc=riskC(r);const n=r.prob*r.impact*r.maitrise;h+='<tr><td>'+r.processus+'</td><td>'+r.risque+'</td><td>'+r.prob+'</td><td>'+r.impact+'</td><td>'+r.maitrise+'</td><td><strong>'+n+'</strong></td><td><span class="'+(n>=40?'rh':n>=20?'rm':'rl')+'">'+rc.l+'</span></td><td>'+r.action+'</td><td>'+r.resp+'</td><td>'+r.ech+'</td><td>'+r.statut+'</td></tr>';});
    h+='</table>';
    h+='<h2>Matrice de criticité</h2><p>Répartition: <strong style="color:#CE0500">'+d.filter(r=>r.prob*r.impact*r.maitrise>=40).length+' critiques</strong>, <strong style="color:#B34000">'+d.filter(r=>{const n=r.prob*r.impact*r.maitrise;return n>=20&&n<40;}).length+' majeurs</strong>, <strong style="color:#0063CB">'+d.filter(r=>{const n=r.prob*r.impact*r.maitrise;return n>=10&&n<20;}).length+' moyens</strong>, <strong style="color:#18753C">'+d.filter(r=>r.prob*r.impact*r.maitrise<10).length+' faibles</strong></p>';
    h+='<div class="sign"><div>L&#39;Agent Comptable<br/><br/><br/>'+(user?.nom||'')+'</div><div>Le Chef d&#39;Établissement<br/><br/><br/>'+(etab?.chef||'')+'</div></div>';
    genPDF('Cartographie des risques — '+(etab?.nom||'Groupement'),h);
  };
  return(<div className="fade"><div className="card">
    <Hdr icon={IC.map} title="Cartographie des Risques — CICF" color={C.err} onExport={()=>{exportCSV(d,'cartographie',[{l:'Processus',a:r=>r.processus},{l:'Risque',a:r=>r.risque},{l:'Prob',a:r=>r.prob},{l:'Impact',a:r=>r.impact},{l:'Maîtrise',a:r=>r.maitrise},{l:'Note',a:r=>r.prob*r.impact*r.maitrise},{l:'Action',a:r=>r.action},{l:'Resp',a:r=>r.resp},{l:'Éch',a:r=>r.ech},{l:'Statut',a:r=>r.statut}]);toast('OK','success');}}>
      <button className="btn btn-ok" onClick={()=>sF({processus:'Trésorerie',risque:'',prob:3,impact:3,maitrise:3,action:'',resp:'',ech:'',statut:'À lancer'})}>{IC.plus} Nouveau risque</button>

      </tr>})}</tbody></table></div>
  </div></div>);
};

const ModPlanAct=()=>{const d=carto.filter(x=>!etab||x.uai===etab.uai);
  const pdfPlan=()=>{let h='<h2>Plan d&#39;action — Contrôle interne comptable et financier</h2><p>Établissement: <strong>'+(etab?.nom||'Agence comptable')+'</strong> — Année: 2025</p><p><strong>Destinataire:</strong> Rectorat / Conseil d&#39;Administration</p>';
    h+='<p><em>Ce plan d&#39;action découle de la cartographie des risques. Il hiérarchise les actions correctives par criticité décroissante.</em></p>';
    h+='<table><tr><th>#</th><th>Processus</th><th>Risque</th><th>Note</th><th>Action corrective</th><th>Responsable</th><th>Échéance</th><th>Statut</th><th>Indicateur de suivi</th></tr>';

    h+='<h2>Synthèse</h2><p>Actions à lancer: <strong>'+d.filter(r=>r.statut==='À lancer').length+'</strong> — En cours: <strong>'+d.filter(r=>r.statut==='En cours').length+'</strong> — Réalisées: <strong>'+d.filter(r=>r.statut==='Réalisé').length+'</strong></p>';
    h+='<div class="sign"><div>L&#39;Agent Comptable<br/><br/><br/>'+(user?.nom||'')+'</div><div>Le Chef d&#39;Établissement<br/><br/><br/>'+(etab?.chef||'')+'</div></div>';

      <button className="btn btn-p" onClick={pdfPlan}>{IC.pdf} PDF Rectorat / CA</button>

    <Ref t="Issu de la cartographie des risques — Hiérarchisé par criticité — Suivi par statut"/>
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}><IntercoLink to="carto" label="Cartographie" icon={IC.map} color={C.err}/><IntercoLink to="organi" label="Organigramme" icon={IC.fork} color={C.ok}/><IntercoLink to="pv" label="PV audit" icon={IC.clip} color={C.p}/></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8,marginBottom:16}}>
      <Kpi label="À lancer" value={d.filter(r=>r.statut==='À lancer').length+''} color={C.err} icon={IC.alert}/>

      <Kpi label="Planifié" value={d.filter(r=>r.statut==='Planifié').length+''} color={C.info} icon={IC.cal}/>
      <Kpi label="Réalisé" value={d.filter(r=>r.statut==='Réalisé').length+''} color={C.ok} icon={IC.check}/>
    </div>
    <table><thead><tr>{['#','Processus','Risque','Note','Action','Resp.','Éch.','Statut',''].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{[...d].sort((a,b)=>(b.prob*b.impact*b.maitrise)-(a.prob*a.impact*a.maitrise)).map((r,i)=>{const n=r.prob*r.impact*r.maitrise;
        return<tr key={r.id}><td className="bold">{i+1}</td><td>{r.processus}</td><td style={{maxWidth:180}}>{r.risque}</td><td><Badge t={n+''} c={n>=40?C.err:n>=20?C.w:C.ok}/></td><td><input value={r.action||''} onChange={e=>setCarto(p=>p.map(x=>x.id===r.id?{...x,action:e.target.value}:x))} className="inp" style={{fontSize:11,padding:'3px 6px',width:'100%',minWidth:120,fontWeight:700}} placeholder="Action corrective..."/></td>

        <td><input value={r.ech||''} onChange={e=>setCarto(p=>p.map(x=>x.id===r.id?{...x,ech:e.target.value}:x))} className="inp" style={{fontSize:11,padding:'3px 6px',width:90}} type="date"/></td>
        <td><select value={r.statut} onChange={e=>{const v=e.target.value;setCarto(p=>p.map(x=>x.id===r.id?{...x,statut:v}:x));log('PLANACT',r.processus+': '+v);toast('Statut → '+v,'success');}} className="inp" style={{fontSize:11,padding:'3px 6px',minWidth:90}}>{['À lancer','Planifié','En cours','Réalisé'].map(o=><option key={o} value={o}>{o}</option>)}</select></td><td><button onClick={()=>{if(confirm('Supprimer cette action ?')){setCarto(p=>p.filter(x=>x.id!==r.id));log('PLANACT_DEL',r.processus);toast('Action supprimée','success');}}} style={{background:'none',border:'none',color:C.g5,cursor:'pointer'}}>{IC.trash}</button></td></tr>})}</tbody></table>
  </div></div>);
};

const ModPV=()=>{const[f,sF]=useState(null);if(!ok('GESTION'))return<Denied/>;
  const initVerifs=(type)=>(VERIF_POINTS[type]||[]).map(v=>({...v,status:'non_verifie',obs:''}));
  const newPV=()=>{const t='Contrôle de caisse';sF({date:new Date().toISOString().split('T')[0],type:t,lieu:etab?.nom||'Agence comptable',objet:'',constatsLibre:'',recomm:'',conclusions:'',sign1:user?.nom||'',sign2:etab?.chef||'',delai:DELAI_SUGG[t],reponseOrd:'',dateReponse:'',conforme:false,phase:'provisoire',verifs:initVerifs(t)});};
  const pdfPV=(p)=>{
    const anomalies=(p.verifs||[]).filter(v=>v.status==='anomalie');
    const conformes=(p.verifs||[]).filter(v=>v.status==='conforme');
    const nonVerifies=(p.verifs||[]).filter(v=>v.status==='non_verifie');
    let h='<h2>Proc\u00e8s-Verbal de Contr\u00f4le '+(p.phase==='définitif'?'DÉFINITIF':'PROVISOIRE')+'</h2>';
    h+='<table><tr><td style="width:30%"><strong>Date du contr\u00f4le</strong></td><td>'+fmtD(p.date)+'</td></tr>';
    h+='<tr><td><strong>Type</strong></td><td>'+p.type+'</td></tr>';
    h+='<tr><td><strong>Lieu</strong></td><td>'+p.lieu+'</td></tr>';
    h+='<tr><td><strong>Objet</strong></td><td>'+p.objet+'</td></tr>';
    h+='<tr><td><strong>Phase</strong></td><td><span class="'+(p.phase==='définitif'?'rl':'rm')+'">'+p.phase.toUpperCase()+'</span></td></tr>';
    h+='<tr><td><strong>Points v\u00e9rifi\u00e9s</strong></td><td>'+conformes.length+' conformes / <strong style="color:#CE0500">'+anomalies.length+' anomalie(s)</strong> / '+nonVerifies.length+' non v\u00e9rifi\u00e9s</td></tr></table>';
    if(anomalies.length>0){
      h+='<h2 style="color:#CE0500">Anomalies constat\u00e9es ('+anomalies.length+')</h2>';
      h+='<p><em>Seules les anomalies effectivement constat\u00e9es lors du contr\u00f4le figurent ci-dessous. Les rubriques non v\u00e9rifi\u00e9es ou d\u00e9clar\u00e9es conformes sont exclues du pr\u00e9sent proc\u00e8s-verbal.</em></p>';
      h+='<table><tr><th style="width:5%">#</th><th style="width:30%">Point de v\u00e9rification</th><th style="width:10%">Criticit\u00e9</th><th style="width:25%">R\u00e9f\u00e9rence r\u00e9glementaire</th><th style="width:30%">Observations</th></tr>';
      anomalies.forEach((a,i)=>{h+='<tr><td>'+(i+1)+'</td><td><strong>'+a.l+'</strong></td><td><span class="'+(a.crit==='CRITIQUE'?'rh':a.crit==='MAJEURE'?'rm':'rl')+'">'+a.crit+'</span></td><td style="font-size:9px;font-style:italic">'+a.ref+'</td><td>'+(a.obs||'').replace(/\n/g,'<br/>')+'</td></tr>';});
      h+='</table>';
    }else{
      h+='<h2 style="color:#18753C">Aucune anomalie constat\u00e9e</h2>';
      h+='<p>L\'ensemble des points v\u00e9rifi\u00e9s ('+conformes.length+') est d\u00e9clar\u00e9 conforme.</p>';
    }
    if(p.constatsLibre&&p.constatsLibre.trim()){h+='<h2>Observations compl\u00e9mentaires</h2><p>'+p.constatsLibre.replace(/\n/g,'<br/>')+'</p>';}
    if(p.recomm&&p.recomm.trim()){h+='<h2>Recommandations</h2><p>'+p.recomm.replace(/\n/g,'<br/>')+'</p>';}
    if(p.conclusions&&p.conclusions.trim()){h+='<h2>Conclusions</h2><p>'+p.conclusions.replace(/\n/g,'<br/>')+'</p>';}
    h+='<h2>Phase contradictoire</h2><table><tr><td style="width:30%"><strong>D\u00e9lai accord\u00e9</strong></td><td>'+p.delai+'</td></tr>';
    if(p.dateReponse)h+='<tr><td><strong>Date r\u00e9ponse ordonnateur</strong></td><td>'+fmtD(p.dateReponse)+'</td></tr>';
    if(p.reponseOrd&&p.reponseOrd.trim())h+='<tr><td><strong>R\u00e9ponse ordonnateur</strong></td><td>'+p.reponseOrd.replace(/\n/g,'<br/>')+'</td></tr>';
    h+='<tr><td><strong>Corrections conformes</strong></td><td>'+(p.conforme?'<span class="rl">OUI</span>':'<span class="rm">EN ATTENTE</span>')+'</td></tr></table>';
    h+='<div class="sign"><div>'+p.sign1+'<br/>Agent Comptable<br/><br/><br/></div><div>'+p.sign2+'<br/>Chef d&#39;\u00c9tablissement<br/><br/><br/></div></div>';
    genPDF('PV — '+p.type+' — '+fmtD(p.date),h);
  };
  return(<div className="fade"><div className="card">
    <Hdr icon={IC.clip} title="Procès-Verbaux d'Audit" color={C.err} onExport={()=>{exportCSV(pvs,'pv_audit',[{l:'Date',a:r=>r.date},{l:'Type',a:r=>r.type},{l:'Établissement',a:r=>r.etab},{l:'Conformes',a:r=>(r.verifs||[]).filter(v=>v.s==='OK').length},{l:'Anomalies',a:r=>(r.verifs||[]).filter(v=>v.s==='KO').length},{l:'Obs',a:r=>r.obs}]);toast('OK','success');}}>
      <button className="btn btn-ok" onClick={newPV}>{IC.plus} Nouveau PV</button>
    </Hdr>
    <Ref t="CRC / DGFiP / Rectorat — PV de contrôle sur pièce et sur place — Double signature"/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:8,marginBottom:10}}>
      <Kpi label="Total PV" value={pvs.length} icon={IC.clip} color={C.info}/>
      <Kpi label="Anomalies" value={pvs.reduce((s,p)=>s+((p.verifs||[]).filter(v=>v.s==='KO').length),0)} icon={IC.alert} color={C.err}/>
      <Kpi label="Conformes" value={pvs.reduce((s,p)=>s+((p.verifs||[]).filter(v=>v.s==='OK').length),0)} icon={IC.check} color={C.ok}/>
    </div>
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}><IntercoLink to="caisse" label="Caisse" icon={IC.bank} color={C.ok}/><IntercoLink to="stocks" label="Stocks" icon={IC.pkg} color={C.w}/><IntercoLink to="rappr" label="Rapprochement" icon={IC.scale} color={C.info}/><IntercoLink to="carto" label="Cartographie" icon={IC.map} color={C.err}/><IntercoLink to="planact" label="Plan action" icon={IC.list} color={C.p}/></div>
    {f&&<div style={{background:C.errL,borderRadius:10,padding:20,marginBottom:16,border:'2px solid '+C.err}}>
      <h3 style={{fontWeight:800,color:C.err,marginBottom:12}}>Rédiger un PV</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
        <Field label="Date" value={f.date} onChange={v=>sF({...f,date:v})} type="date" req/>
        <Field label="Type de contrôle" value={f.type} onChange={v=>sF({...f,type:v,delai:DELAI_SUGG[v]||'30 jours',verifs:initVerifs(v)})} opts={['Contrôle de caisse','Inventaire stocks','Rapprochement bancaire','Contrôle régies','Audit voyages scolaires','Audit bourses','Contrôle commande publique','Audit budgets annexes','Contrôle fonds sociaux','Vérification patrimoine','Audit restauration','Contrôle global']} req/>
        <Field label="Lieu" value={f.lieu} onChange={v=>sF({...f,lieu:v})} req/>
      </div>
      <Field label="Objet du contrôle" value={f.objet} onChange={v=>sF({...f,objet:v})} ph="Préciser l'objet du contrôle..." req/>
      {/* ═══ POINTS DE VÉRIFICATION STRUCTURÉS ═══ */}
      {f.verifs&&f.verifs.length>0&&<div style={{background:'#fff',borderRadius:10,padding:16,marginTop:8,border:'1.5px solid '+C.p}}>
        <h4 style={{fontWeight:800,color:C.p,marginBottom:4,fontSize:13}}>{IC.checkSq} Points de vérification — {f.type}</h4>
        <p style={{fontSize:10,color:C.g5,marginBottom:12}}>Cochez chaque point vérifié. Seules les anomalies constatées apparaîtront sur le PV imprimable. Les rubriques non vérifiées seront exclues du PV.</p>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {f.verifs.map((v,i)=><div key={i} style={{padding:'10px 14px',borderRadius:8,border:'1.5px solid '+(v.status==='anomalie'?C.err:v.status==='conforme'?C.ok:C.g2),background:v.status==='anomalie'?C.errL:v.status==='conforme'?C.okL+'40':'#fafafa'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontWeight:700,fontSize:12,color:v.status==='anomalie'?C.err:C.g7}}>{v.l}</div>
                <div style={{fontSize:10,color:C.p,fontStyle:'italic',marginTop:2}}>{v.ref}</div>
                {v.crit&&<span style={{fontSize:9,fontWeight:800,padding:'1px 6px',borderRadius:3,background:v.crit==='CRITIQUE'?C.err:v.crit==='MAJEURE'?C.w:C.info,color:'#fff',marginTop:3,display:'inline-block'}}>{v.crit}</span>}
              </div>
              <div style={{display:'flex',gap:4,flexShrink:0}}>
                <button className={'btn '+(v.status==='conforme'?'btn-ok':'btn-g')} onClick={()=>{const nv=[...f.verifs];nv[i]={...v,status:'conforme',obs:''};sF({...f,verifs:nv});}} style={{fontSize:10,padding:'3px 8px'}}>{IC.check} Conforme</button>
                <button className={'btn '+(v.status==='anomalie'?'btn-err':'btn-g')} onClick={()=>{const nv=[...f.verifs];nv[i]={...v,status:'anomalie'};sF({...f,verifs:nv});}} style={{fontSize:10,padding:'3px 8px'}}>{IC.alert} Anomalie</button>
                <button className={'btn '+(v.status==='non_verifie'?'btn-g':'btn-g')} onClick={()=>{const nv=[...f.verifs];nv[i]={...v,status:'non_verifie',obs:''};sF({...f,verifs:nv});}} style={{fontSize:10,padding:'3px 8px',opacity:v.status==='non_verifie'?1:0.5}}>— Non vérifié</button>
              </div>
            </div>
            {v.status==='anomalie'&&<div style={{marginTop:6}}><textarea className="inp" rows={2} value={v.obs||''} onChange={e=>{const nv=[...f.verifs];nv[i]={...v,obs:e.target.value};sF({...f,verifs:nv});}} placeholder="Détailler l'anomalie constatée..." style={{fontSize:11,width:'100%',borderColor:C.err}}/></div>}
          </div>)}
        </div>
        <div style={{marginTop:10,padding:'8px 12px',borderRadius:6,background:C.g1,fontSize:11,display:'flex',gap:16,flexWrap:'wrap',alignItems:'center'}}>
          <span><strong style={{color:C.ok}}>{f.verifs.filter(v=>v.status==='conforme').length}</strong> conformes</span>
          <span><strong style={{color:C.err}}>{f.verifs.filter(v=>v.status==='anomalie').length}</strong> anomalies</span>
          <span><strong style={{color:C.g5}}>{f.verifs.filter(v=>v.status==='non_verifie').length}</strong> non vérifiés</span>
          <div style={{marginLeft:'auto',display:'flex',gap:4}}>
            <button className="btn btn-ok" style={{fontSize:9,padding:'2px 8px'}} onClick={()=>sF({...f,verifs:f.verifs.map(v=>({...v,status:'conforme',obs:''}))})}>✓ Tout conforme</button>
            <button className="btn btn-g" style={{fontSize:9,padding:'2px 8px'}} onClick={()=>sF({...f,verifs:f.verifs.map(v=>({...v,status:'non_verifie',obs:''}))})}>↺ Réinitialiser</button>
          </div>
        </div>
      </div>}
      <Field label="Constats complémentaires (libre)" value={f.constatsLibre||''} onChange={v=>sF({...f,constatsLibre:v})} rows={3} ph="Observations complémentaires hors points de vérification ci-dessus..."/>
      <Field label="Recommandations" value={f.recomm} onChange={v=>sF({...f,recomm:v})} rows={3} ph="Actions correctives préconisées..."/>
      <Field label="Conclusions" value={f.conclusions} onChange={v=>sF({...f,conclusions:v})} rows={2} ph="Conclusion générale du contrôle..."/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><Field label="Signataire 1 (AC)" value={f.sign1} onChange={v=>sF({...f,sign1:v})}/><Field label="Signataire 2 (CE)" value={f.sign2} onChange={v=>sF({...f,sign2:v})}/></div>
      {/* CONTRADICTOIRE */}
      <div style={{background:'#fff',borderRadius:8,padding:14,marginTop:12,border:'1.5px dashed '+C.info}}>
        <h4 style={{fontWeight:800,color:C.info,marginBottom:8,fontSize:13}}>{IC.clock} Phase contradictoire — Droit de réponse de l'ordonnateur</h4>
        <p style={{fontSize:11,color:C.g5,marginBottom:8}}>L'ordonnateur dispose d'un délai raisonnable pour apporter corrections ou observations. Le délai suggéré varie selon la nature du contrôle.</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          <Field label="Délai accordé" value={f.delai} onChange={v=>sF({...f,delai:v})} opts={['24 heures','48 heures','72 heures','7 jours','15 jours','30 jours','60 jours','90 jours']}/>
          <Field label="Phase" value={f.phase} onChange={v=>sF({...f,phase:v})} opts={['provisoire','contradictoire','définitif']}/>
          <Field label="Date réponse ordo." value={f.dateReponse} onChange={v=>sF({...f,dateReponse:v})} type="date"/>
        </div>
        <Field label="Réponse / observations de l'ordonnateur" value={f.reponseOrd} onChange={v=>sF({...f,reponseOrd:v})} rows={3} ph="Corrections apportées, justifications, engagements pris par l'ordonnateur..."/>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,fontWeight:700,color:f.conforme?C.ok:C.g5,marginTop:6,cursor:'pointer'}}><input type="checkbox" checked={f.conforme} onChange={e=>sF({...f,conforme:e.target.checked,phase:e.target.checked?'définitif':f.phase})}/>{IC.check} Corrections conformes — PV définitif</label>
      </div>
      <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn btn-ok" onClick={()=>{if(!f.objet){toast('Objet requis','warning');return;}const nv={id:uid(),date:f.date,type:f.type,lieu:f.lieu,objet:f.objet,constatsLibre:f.constatsLibre||'',verifs:f.verifs||[],recomm:f.recomm,conclusions:f.conclusions,sign1:f.sign1,sign2:f.sign2,delai:f.delai,reponseOrd:f.reponseOrd,dateReponse:f.dateReponse,conforme:f.conforme,phase:f.phase};setPvs(p=>[nv,...p]);log('PV_AUDIT',f.type+' ['+f.phase+']');toast('PV enregistré ('+f.phase+')','success');sF(null);}}>{IC.check} Enregistrer</button><button className="btn btn-err" onClick={()=>sF(null)}>{IC.x}</button></div>
    </div>}
    {pvs.length===0&&<div style={{textAlign:'center',padding:40,color:C.g5}}>Aucun PV — Cliquez "Nouveau PV" pour commencer</div>}
    {pvs.map(p=><div key={p.id} style={{padding:'16px 18px',borderRadius:10,border:p.phase==='définitif'?'2px solid '+C.ok:'1px solid '+C.g2,marginBottom:10,background:p.phase==='définitif'?C.okL:'#fff'}}>
      <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:6,marginBottom:8}}><div><strong style={{fontSize:15}}>{p.type}</strong> <Badge t={p.phase||'provisoire'} c={p.phase==='définitif'?C.ok:C.w}/><div style={{fontSize:12,color:C.g5}}>{fmtD(p.date)} — {p.lieu} — Délai: {p.delai||'—'}</div></div><div style={{display:'flex',gap:6}}><button className="btn btn-p" onClick={()=>pdfPV(p)} style={{padding:'4px 10px',fontSize:11}}>{IC.pdf} PDF</button><button onClick={()=>{sF({...p,verifs:p.verifs||initVerifs(p.type)});}} style={{background:'none',border:'none',color:C.info}}>{IC.edit}</button><button onClick={()=>{setPvs(pr=>pr.filter(x=>x.id!==p.id));toast('Supprimé','warning');}} style={{background:'none',border:'none',color:C.g5}}>{IC.trash}</button></div></div>
      <div style={{fontSize:13,color:C.g7}}><strong>Objet:</strong> {p.objet}</div>
      <div style={{fontSize:12,color:C.g5,marginTop:4,maxHeight:60,overflow:'hidden'}}>{((p.verifs||[]).filter(v=>v.status==='anomalie').length>0?(p.verifs||[]).filter(v=>v.status==='anomalie').map(a=>a.l).join(' — '):(p.constatsLibre||p.constats||'').substring(0,150))}...</div>
    </div>)}
  </div></div>);
};

const ModLogs=()=>{const[filt,sFilt]=useState('');const[typeFilt,sTypeFilt]=useState('');if(!ok('GESTION'))return<Denied/>;
  const types=[...new Set(logs.map(l=>l.a))];

    <Field label="Notes produits" value={notes.produitsNotes} onChange={v=>setNotes(n=>({...n,produitsNotes:v}))} rows={2} ph="Faits marquants recettes, conditions emploi subventions..."/>
    <Field label="Notes charges" value={notes.chargesNotes} onChange={v=>setNotes(n=>({...n,chargesNotes:v}))} rows={2} ph="Évolution charges significatives, marchés importants..."/>

    <h3 style={{fontWeight:800,color:C.p,borderLeft:'4px solid '+C.p,paddingLeft:10,margin:'16px 0 10px'}}>IV. Autres informations</h3>
    <Field label="Engagements hors bilan" value={notes.horsBilan} onChange={v=>setNotes(n=>({...n,horsBilan:v}))} rows={2} ph="Contrats pluriannuels, cautions, engagements financiers à terme..."/>
    <Field label="Effectifs et organisation" value={notes.effectifs} onChange={v=>setNotes(n=>({...n,effectifs:v}))} rows={2} ph="Mouvements de personnel, organisation des services..."/>
  </div></div>);
};

// ═══════════════════════════════════════════════════════
// APP SHELL
// ═══════════════════════════════════════════════════════
const curMod=NAV.find(n=>n.k&&n.k===mod);
const modContent=()=>{switch(mod){
  case 'dashboard':return<ModDash/>;case 'caisse':return<ModCaisse/>;case 'stocks':return<ModStocks/>;case 'voyages':return<ModVoy/>;
  case 'bourses':return<ModBourses/>;case 'fonds':return<ModFonds/>;case 'analyse':return<ModAnalyse/>;case 'rappr':return<ModRappr/>;
  case 'recouvr':return<ModRecouvr/>;case 'epcp':return<ModEPCP/>;case 'subv':return<ModSubv/>;case 'restaur':return<ModRest/>;
  case 'budgets':return<ModBA/>;case 'plan':return<ModPlan/>;case 'carto':return<ModCarto/>;case 'organi':return<ModOrgani/>;
  case 'planact':return<ModPlanAct/>;case 'pv':return<ModPV/>;case 'annexe':return<ModAnnexe/>;case 'logs':return<ModLogs/>;case 'params':return<ModParams/>;
  default:return<ModDash/>;}};

return(
<div style={{minHeight:'100vh',display:'flex'}}>
  <Toasts/><HelpModal/>
  {/* SIDEBAR */}
  {sb&&<div className="sidebar" style={{width:220,background:'#fff',borderRight:'1px solid '+C.g2,position:'fixed',left:0,top:0,bottom:0,overflowY:'auto',zIndex:100,padding:'12px 0'}}>
    <div style={{padding:'8px 16px 16px',textAlign:'center',borderBottom:'1px solid '+C.g2,marginBottom:8}}>
      <div style={{fontWeight:900,fontSize:16,color:C.p}}>IA Audit v7.5</div>
      <div style={{fontSize:10,color:C.g5,textTransform:'uppercase',letterSpacing:1}}>EPLE — 21 modules CICF</div>
    </div>
    {NAV.map((n,i)=>{
      if(n.sec)return<div key={'s'+i} className="nav-section">{n.sec}</div>;
      const act=mod===n.k;const icon=IC[n.ic]||IC.dash;const canSee=!n.d||ok(n.d);
      return canSee?<button key={n.k} onClick={()=>setMod(n.k)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'7px 16px',border:'none',background:act?C.pL:'transparent',color:act?C.p:C.g7,fontWeight:act?800:600,fontSize:12,cursor:'pointer',borderLeft:act?'3px solid '+C.p:'3px solid transparent',transition:'all .1s'}}>{icon}<span>{n.l}</span></button>:null})}
    <div style={{padding:'12px 16px',borderTop:'1px solid '+C.g2,marginTop:8}}>
      <button onClick={()=>setShowHelp(true)} style={{display:'flex',alignItems:'center',gap:6,width:'100%',padding:'6px 0',border:'none',background:'none',color:C.info,fontSize:12,fontWeight:700,cursor:'pointer'}}>{IC.help} Aide</button>
      <button onClick={()=>{if(confirm('Réinitialiser TOUTES les données ? Cette action est irréversible.')){if(_ls){Object.keys(localStorage).filter(k=>k.startsWith('ia_audit_')).forEach(k=>localStorage.removeItem(k));}location.reload();}}} style={{display:'flex',alignItems:'center',gap:6,width:'100%',padding:'6px 0',border:'none',background:'none',color:C.err,fontSize:11,fontWeight:600,cursor:'pointer'}}>{IC.trash} Réinitialiser données</button>
    </div>
  </div>}
  {/* MAIN */}
  <div style={{flex:1,marginLeft:sb?220:0,transition:'margin .2s'}}>
    {/* HEADER */}
    <header style={{background:'#fff',borderBottom:'1px solid '+C.g2,padding:'8px 20px',display:'flex',flexWrap:'wrap',alignItems:'center',justifyContent:'space-between',gap:8,position:'sticky',top:0,zIndex:50}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button onClick={()=>setSb(!sb)} style={{background:'none',border:'none',color:C.g7,cursor:'pointer'}}>{IC.list}</button>
        <h1 style={{fontSize:16,fontWeight:800,color:C.g9}}>{curMod?.l||'Tableau de Bord'}</h1>
        <div style={{position:'relative'}}><input className="inp" placeholder="Rechercher..." style={{width:180,padding:'4px 10px',fontSize:12}} onChange={e=>{const q=e.target.value.toLowerCase();if(q.length<2){setMdl(null);return;}
          const res=[];
          ctrl.forEach(x=>{if((x.reg||'').toLowerCase().includes(q))res.push({mod:'caisse',t:'Caisse: '+x.reg,d:fmtD(x.date)});});
          stocks.forEach(x=>{if(x.nom.toLowerCase().includes(q))res.push({mod:'stocks',t:'Stock: '+x.nom,d:x.ref});});
          voy.forEach(x=>{if(x.titre.toLowerCase().includes(q))res.push({mod:'voyages',t:'Voyage: '+x.titre,d:x.classe});});
          bourses.forEach(x=>{if(x.nom.toLowerCase().includes(q))res.push({mod:'bourses',t:'Bourse: '+x.nom,d:x.classe});});
          cr.forEach(x=>{if(x.deb.toLowerCase().includes(q))res.push({mod:'recouvr',t:'Créance: '+x.deb,d:fmt(x.mt)});});
          subs.forEach(x=>{if(x.type.toLowerCase().includes(q))res.push({mod:'subv',t:'Subv: '+x.type,d:x.prog});});
          epcp.forEach(x=>{if(x.objet.toLowerCase().includes(q))res.push({mod:'epcp',t:'Marché: '+x.objet,d:x.proc});});
          carto.forEach(x=>{if(x.risque.toLowerCase().includes(q))res.push({mod:'carto',t:'Risque: '+x.risque,d:x.processus});});
          pvs.forEach(x=>{if((x.type||'').toLowerCase().includes(q)||(x.objet||'').toLowerCase().includes(q))res.push({mod:'pv',t:'PV: '+x.type,d:fmtD(x.date)});});
          equipe.forEach(x=>{if(x.nom.toLowerCase().includes(q))res.push({mod:'organi',t:x.nom,d:x.fonction});});
          fonds.forEach(x=>{if((x.nom||'').toLowerCase().includes(q)||(x.objet||'').toLowerCase().includes(q))res.push({mod:'fonds',t:'Fonds: '+x.nom,d:x.type+' '+fmt(x.mt)});});
          rest.forEach(x=>{if((x.mois||'').includes(q))res.push({mod:'restaur',t:'Restauration: '+x.mois,d:x.repas+' repas'});});
          rappr.forEach(x=>{if((x.date||'').includes(q)||(x.obs||'').toLowerCase().includes(q))res.push({mod:'rappr',t:'Rappro: '+fmtD(x.date),d:x.statut});});
          plan.forEach(x=>{if((x.type||'').toLowerCase().includes(q))res.push({mod:'plan',t:'Plan: '+x.type,d:x.freq});});
          ba.forEach(x=>{if((x.nom||'').toLowerCase().includes(q))res.push({mod:'budgets',t:'BA: '+x.nom,d:x.type});});
          logs.slice(0,200).forEach(x=>{if((x.a||'').toLowerCase().includes(q)||(x.d||'').toLowerCase().includes(q))res.push({mod:'logs',t:'Log: '+x.a,d:x.d?.substring(0,40)});});
          if(res.length)setMdl({type:'search',results:res,query:q});else setMdl(null);
        }}/>{mdl?.type==='search'&&<div style={{position:'absolute',top:'100%',right:0,background:'#fff',borderRadius:10,boxShadow:'0 12px 40px rgba(0,0,0,.15)',border:'1px solid '+C.g2,width:320,maxHeight:300,overflowY:'auto',zIndex:200,padding:4}}>
          <div style={{padding:'6px 10px',fontSize:10,color:C.g5,fontWeight:700}}>{mdl.results.length} résultat(s) pour "{mdl.query}"</div>
          {mdl.results.slice(0,15).map((r,i)=><div key={i} onClick={()=>{setMod(r.mod);setMdl(null);}} style={{padding:'6px 10px',borderRadius:6,cursor:'pointer',fontSize:12,display:'flex',justifyContent:'space-between'}} onMouseEnter={e=>e.currentTarget.style.background=C.pL} onMouseLeave={e=>e.currentTarget.style.background=''}><span style={{fontWeight:600}}>{r.t}</span><span style={{color:C.g5,fontSize:11}}>{r.d}</span></div>)}
        </div>}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
        <button className="btn" onClick={()=>setEtab(null)} style={{background:!etab?C.p:'#fff',color:!etab?'#fff':C.g7,border:'1.5px solid '+(etab?C.g2:C.p),fontSize:11}}>Global</button>
        {etabs.map(e=><button key={e.uai} className="btn" onClick={()=>setEtab(e)} style={{background:etab?.uai===e.uai?C.p:'#fff',color:etab?.uai===e.uai?'#fff':C.g7,border:'1.5px solid '+(etab?.uai===e.uai?C.p:C.g2),fontSize:11}}>{e.uai}</button>)}
        <div style={{width:1,height:20,background:C.g2,margin:'0 4px'}}/>
        <span style={{fontSize:12,fontWeight:700,color:C.p}}>{user?.nom}</span>
        <button onClick={()=>{log('DECONNEXION','');setUser(null);setMod('dashboard');toast('Déconnecté','info');}} className="btn btn-g" style={{fontSize:11}}>{IC.logout}</button>
      </div>
    </header>
    <main style={{padding:20,maxWidth:1200,margin:'0 auto'}}>{modContent()}</main>
  </div>
</div>
);
}

try{ReactDOM.render(<App/>,document.getElementById('root'));}catch(e){document.getElementById('root').innerHTML='<div style="padding:40px;color:red;font-family:monospace"><h2>Erreur de chargement</h2><pre>'+e.message+'\n'+e.stack+'</pre></div>';}
</script></body></html>
